services:
  - type: web
    name: step-alloy-prediction-simple
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn simple_app.app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: /app
    healthCheckPath: /api/health
    plan: free
