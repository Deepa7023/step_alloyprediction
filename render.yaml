services:
  - type: web
    name: step-alloy-prediction
    runtime: docker
    env: python
    buildCommand: "docker build -t step-alloy-prediction ."
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: METALS_API_KEY
        sync: false # Set this in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: TINYFISH_API_KEY
        sync: false
      - key: PYTHONPATH
        value: /app
    healthCheckPath: /api/health
    plan: free 
