services:
  - type: web
    name: step-alloy-prediction-simple
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn simple_app.app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1"
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: /app
      - key: CAD_BREP_ENABLED
        value: false
      - key: STEP_LIGHTWEIGHT_FILL_FACTOR
        value: 0.013
      - key: STEP_LIGHTWEIGHT_SURFACE_FACTOR
        value: 0.15
    healthCheckPath: /api/health
    plan: free
